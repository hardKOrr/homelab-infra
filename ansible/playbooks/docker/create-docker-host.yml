---

- name: Create docker host
  hosts: proxmox_nodes
  become: false
  gather_facts: true
  pre_tasks:
    - name: Load user vars
      ansible.builtin.import_tasks: ../../tasks/load-user-vars.yml

    - name: Set docker host selector
      ansible.builtin.set_fact:
        docker_host_tag: "{{ docker_tag | default('docker_default_host') }}"
      run_once: true

    - name: Assert docker host config exists
      ansible.builtin.assert:
        that:
          - homelabinfra_config.docker_hosts is defined
          - homelabinfra_config.docker_hosts[docker_host_tag] is defined
          - homelabinfra_config.docker_hosts[docker_host_tag].type is defined
          - homelabinfra_config.docker_hosts[docker_host_tag].type in ['lxc', 'vm']
        fail_msg: "Required homelabinfra_config inputs: docker_hosts[<tag>].type (must be 'lxc' or 'vm')"
      run_once: true

    - name: Set docker host type
      ansible.builtin.set_fact:
        docker_host_type: "{{ homelabinfra_config.docker_hosts[docker_host_tag].type }}"
      run_once: true

    - name: Ensure LXC keyctl feature for docker hosts
      ansible.builtin.set_fact:
        homelabinfra_config: "{{ homelabinfra_config | combine({'proxmox': {'lxc': {'features': lxc_features}}}, recursive=True) }}"
      vars:
        existing_features: "{{ homelabinfra_config.proxmox.lxc.features | default([]) }}"
        lxc_features: >-
          {{
            (existing_features is mapping)
            | ternary(
                existing_features | combine({'keyctl': true}),
                (existing_features + ['keyctl=1']) | unique
              )
          }}
      when: docker_host_type == 'lxc'
      run_once: true
  tasks:
    - name: Create docker host as LXC
      block:
        - name: Generate IP Address for LXC Docker Host
          ansible.builtin.import_tasks: ../../tasks/network/generate-ip.yml
          vars:
            network_name: "{{ homelabinfra_config.proxmox.lxc.network | default('default') }}"

        - name: Set LXC IP Address fact
          ansible.builtin.set_fact:
            homelabinfra_config: "{{ homelabinfra_config | combine({'proxmox': {'lxc': {'ip_address': homelabinfra_instance.network.ip_address}}}, recursive=True) }}"

        - name: Derive LXC VMID from IP (if needed)
          ansible.builtin.import_tasks: ../../tasks/proxmox/ip-to-vmid.yml

        - name: Proxmox Create LXC Docker Host
          ansible.builtin.include_tasks:
            file: ../../tasks/proxmox/lxc-create.yml
      when: docker_host_type == 'lxc'

    - name: Create docker host as VM
      block:
        - name: Generate IP Address for VM Docker Host
          ansible.builtin.import_tasks: ../../tasks/network/generate-ip.yml
          vars:
            network_name: "{{ homelabinfra_config.proxmox.vm.network | default('default') }}"

        - name: Set VM IP Address fact
          ansible.builtin.set_fact:
            homelabinfra_config: "{{ homelabinfra_config | combine({'proxmox': {'vm': {'ip_address': homelabinfra_instance.network.ip_address}}}, recursive=True) }}"

        - name: Derive VMID from IP (if needed)
          ansible.builtin.import_tasks: ../../tasks/proxmox/ip-to-vmid.yml

        - name: Proxmox Create VM Docker Host
          ansible.builtin.include_tasks:
            file: ../../tasks/proxmox/vm-create.yml
      when: docker_host_type == 'vm'

    - name: Add docker host to inventory
      ansible.builtin.add_host:
        name: "{{ homelabinfra_instance.lxc.hostname if docker_host_type == 'lxc' else homelabinfra_instance.vm.name }}"
        groups: provisioning
        ansible_host: "{{ homelabinfra_instance.lxc.ip_address if docker_host_type == 'lxc' else homelabinfra_instance.vm_ansible_host }}"
        ansible_user: "{{ homelabinfra_config.ansible.ssh_user }}"
        ansible_ssh_private_key_file: "~/.ssh/id_rsa"
      run_once: true

- name: Bootstrap new Docker host
  hosts: provisioning
  become: true
  gather_facts: true
  pre_tasks:
    - name: Load user vars
      ansible.builtin.import_tasks: ../../tasks/load-user-vars.yml
    - name: Load infrastructure facts
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../../config/.generated/facts.yml"
        name: homelabinfra_infra
      failed_when: false
  tasks:
    - name: Bootstrap guest
      ansible.builtin.import_tasks: ../../tasks/guest-bootstrap.yml
      when: not (ansible_local.homelab_bootstrapped.bootstrapped | default(false) | bool)

- name: Apply Docker role to host
  hosts: provisioning
  become: true
  gather_facts: true
  pre_tasks:
    - name: Load user vars
      ansible.builtin.import_tasks: ../../tasks/load-user-vars.yml
  roles:
    - docker
