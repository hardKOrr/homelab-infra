---
# Check native LXC apps for available updates.
# Calls lab-update-check on each managed host that has it installed.
# Sends a single Ntfy notification listing all apps that are behind.
# Does NOT update — re-run the app's deploy playbook to update.
#
# Schedule: weekly via Semaphore/Rundeck.

- name: Gather update status from managed hosts
  hosts: tag_homelab_infra
  gather_facts: false
  ignore_unreachable: true
  tasks:
    - name: Check if lab-update-check is installed
      ansible.builtin.stat:
        path: /usr/local/bin/lab-update-check
      register: _script_stat
      failed_when: false

    - name: Run update check
      ansible.builtin.command: /usr/local/bin/lab-update-check
      register: _check_raw
      changed_when: false
      failed_when: false
      when: _script_stat.stat.exists

    - name: Parse update check result
      ansible.builtin.set_fact:
        _update_result: "{{ _check_raw.stdout | from_json }}"
      when:
        - _script_stat.stat.exists
        - _check_raw.rc == 0

- name: Report available updates
  hosts: localhost
  gather_facts: false
  pre_tasks:
    - name: Load user vars
      ansible.builtin.import_tasks: ../../tasks/load-user-vars.yml
  tasks:
    - name: Collect apps with updates available
      ansible.builtin.set_fact:
        _updates_available: >-
          {{
            hostvars.values()
            | selectattr('_update_result', 'defined')
            | selectattr('_update_result.update_available', 'equalto', true)
            | map(attribute='_update_result')
            | list
          }}

    - name: Notify via Ntfy
      ansible.builtin.uri:
        url: "{{ homelabinfra_infra.ntfy.url }}/homelab"
        method: POST
        headers:
          Title: "Homelab App Updates Available"
          Priority: "default"
        body: |
          {{ _updates_available | length }} app(s) have updates available:

          {% for app in _updates_available %}
          • {{ app.app }}: {{ app.installed }} → {{ app.latest }}
          {% endfor %}

          Re-run the Deploy App job for each to update.
        body_format: raw
      when: _updates_available | length > 0
