---
# Rundeck needs to pass in user-vars.yml as -e @user-vars.yml to properly load homelabinfra_config
plugin: community.proxmox.proxmox
url: "{{ homelabinfra_config.proxmox.api_host }}:{{ homelabinfra_config.proxmox.api_port | default(8006) }}"
user: "{{ homelabinfra_config.proxmox.api_user | default('root@pam') }}"
token_id: "{{ homelabinfra_config.proxmox.api_token_id }}"
token_secret: "{{ homelabinfra_config.proxmox.api_token_secret }}"
validate_certs: false
want_facts: true
groups:
  proxmox_nodes: "type == 'node'"
  proxmox_clients: "type in ['qemu', 'lxc']"
keyed_groups:
  - key: tags
    prefix: tag
    separator: "_"
