#   wiring_ip:         IP address to resolve to (the Caddy/Nginx host IP, or app IP for internal)
#
# Reads from homelabinfra_infra (loaded from config/.generated/facts.yml):
#   homelabinfra_infra.dns.host        OPNsense IP
