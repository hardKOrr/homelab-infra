#   homelabinfra_infra.dns.api_secret  OPNsense API secret
#
# Steps:
#   1. POST to OPNsense API: /api/unbound/host/addHost
#   2. Apply Unbound config: /api/unbound/service/reconfigure
#
# Conditions: only runs when homelabinfra_infra.dns.provider == 'opnsense'
# Docs: https://docs.opnsense.org/development/api/core/unbound.html
