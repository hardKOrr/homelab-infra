---

- name: Assert homelabinfra instance data is provided
  ansible.builtin.assert:
    that:
      - homelabinfra_config is defined
      - homelabinfra_config.ansible.ssh_public_key is defined
      - homelabinfra_config.proxmox.api_host is defined
      - homelabinfra_config.proxmox.api_token_id is defined
      - homelabinfra_config.proxmox.api_token_secret is defined
      - homelabinfra_config.proxmox.node is defined
      - homelabinfra_config.proxmox.lxc.vmid is defined
      - homelabinfra_config.proxmox.lxc.hostname is defined
      - homelabinfra_config.proxmox.lxc.ostemplate is defined
      - homelabinfra_config.proxmox.lxc.ip_address is defined
    fail_msg: "Required homelabinfra_config inputs: ansible[ssh_public_key], proxmox[api_host,api_token_id,api_token_secret,node,lxc[vmid,hostname,ostemplate,ip_address]]"

- name: Build facts for usage in proxmox lxc creation
  ansible.builtin.set_fact:
    homelabinfra_instance: >-
      {{ homelabinfra_instance | combine({'lxc': dict(
          state = 'present',
          api_host = homelabinfra_config.proxmox.api_host,
          api_port = homelabinfra_config.proxmox.api_port,
          api_token_id = homelabinfra_config.proxmox.api_token_id,
          api_token_secret = homelabinfra_config.proxmox.api_token_secret,
          node = homelabinfra_config.proxmox.node,
          pubkey = homelabinfra_config.ansible.ssh_public_key
        ) | combine(homelabinfra_config.proxmox.lxc, recursive=True)}, recursive=True) }}

- name: Build LXC network settings
  ansible.builtin.set_fact:
    lxc_ip_cidr: >-
      {{
        'dhcp'
        if (homelabinfra_instance.network.ip_address | lower) == 'dhcp'
        else homelabinfra_instance.network.ip_address ~ '/' ~ (homelabinfra_instance.network.cidr | ansible.utils.ipaddr('prefix'))
      }}
    lxc_netif: >-
      name=eth0,ip={{ lxc_ip_cidr }}
      {%- if homelabinfra_instance.network.gateway is defined and (homelabinfra_instance.network.ip_address | lower) != 'dhcp' -%}
      ,gw={{ homelabinfra_instance.network.gateway }}
      {%- endif -%}
      {%- if homelabinfra_instance.network.bridge is defined -%}
      ,bridge={{ homelabinfra_instance.network.bridge }}
      {%- endif -%}
      {%- if homelabinfra_instance.network.vlan is defined and (homelabinfra_instance.network.vlan | int) > 0 -%}
      ,tag={{ homelabinfra_instance.network.vlan }}
      {%- endif -%}
  when: homelabinfra_instance.network is defined

- name: Merge LXC network settings
  ansible.builtin.set_fact:
    homelabinfra_instance: >-
      {{ homelabinfra_instance | combine({'lxc':
          homelabinfra_instance.lxc
          | combine(
              dict(netif=dict(net0=lxc_netif)),
              recursive=True
            )
          | combine(
              (homelabinfra_instance.network.dns_servers is defined and (homelabinfra_instance.network.dns_servers | length > 0))
              | ternary(dict(nameserver=(homelabinfra_instance.network.dns_servers | join(' '))), {}),
              recursive=True
            )
          | combine(
              homelabinfra_instance.network.searchdomain is defined
              | ternary(dict(searchdomain=homelabinfra_instance.network.searchdomain), {}),
              recursive=True
            )
        }, recursive=True) }}
  when: homelabinfra_instance.network is defined

- name: Build LXC module arguments from the community.proxmox.proxmox allowlist
  ansible.builtin.set_fact:
    lxc_module_args: >-
      {{ homelabinfra_instance.lxc | dict2items
         | selectattr('key', 'in', lxc_module_keys)
         | items2dict
         | combine({'api_user': homelabinfra_config.proxmox.api_user}) }}
  vars:
    # community.proxmox.proxmox parameters only. User/bookkeeping keys (network, ip_address)
    # are absent by design so they can never reach the module. Every key here is verified
    # against the community.proxmox 2.0.0 argument spec — see this plan's Verification step 2.
    lxc_module_keys:
      - state
      - api_host
      - api_port
      - api_user
      - api_token_id
      - api_token_secret
      - node
      - pubkey
      - vmid
      - hostname
      - ostemplate
      - cores
      - memory
      - tags
      - features
      - password
      - description
      - onboot
      - disk_volume
      - storage
      - netif
      - nameserver
      - searchdomain
      - swap
      - unprivileged
      - ostype
      - timezone
      - timeout
      - cpuunits
      - mounts
      - mount_volumes
      - pool
      - hookscript
      - startup

- name: Create LXC container
  community.proxmox.proxmox: "{{ lxc_module_args }}"
  register: create_lxc_result

- name: Wait for LXC to be running
  ansible.builtin.command:
    cmd: "pct status {{ homelabinfra_instance.lxc.vmid }}"
  delegate_to: "{{ homelabinfra_config.proxmox.node }}"
  register: lxc_status
  retries: 30
  delay: 2
  until: "'status: running' in lxc_status.stdout"
  changed_when: false

- name: Wait for LXC to accept exec
  ansible.builtin.command:
    cmd: "pct exec {{ homelabinfra_instance.lxc.vmid }} -- /bin/true"
  delegate_to: "{{ homelabinfra_config.proxmox.node }}"
  register: lxc_exec_ready
  retries: 30
  delay: 2
  until: lxc_exec_ready.rc == 0
  changed_when: false

- name: Write LXC instance data to /root/home
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'EOF' | pct exec {{ homelabinfra_instance.lxc.vmid }} -- /bin/sh -c 'mkdir -p /root/home && cat > /root/home/homelabinfra_instance.lxc.json'
    {{ homelabinfra_instance.lxc | to_nice_json }}
    EOF
  delegate_to: "{{ homelabinfra_config.proxmox.node }}"
  args:
    executable: /bin/bash
