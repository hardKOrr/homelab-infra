---

- name: Set network selector
  ansible.builtin.set_fact:
    network_name: "{{ network_name | default('default') }}"
  run_once: true

- name: Assert network config exists
  ansible.builtin.assert:
    that:
      - homelabinfra_config is defined
      - homelabinfra_config.networks is defined
      - homelabinfra_config.networks[network_name] is defined
      - homelabinfra_config.networks[network_name].cidr is defined
    fail_msg: "Required inputs: homelabinfra_config.networks[<name>].cidr"
  run_once: true

- name: Build effective network config
  ansible.builtin.set_fact:
    network_config: "{{ homelabinfra_config.networks.default | default({}) | combine(homelabinfra_config.networks[network_name], recursive=True) }}"
  run_once: true

- name: Use DHCP for IP allocation
  ansible.builtin.set_fact:
    final_ip_address: "dhcp"
  when: network_config.cidr is string and network_config.cidr | lower == 'dhcp'
  run_once: true

- name: Allocate static IP in subnet
  when: network_config.cidr is not string or network_config.cidr | lower != 'dhcp'
  run_once: true
  block:
    - name: Collect existing client IPs from proxmox inventory
      ansible.builtin.set_fact:
        proxmox_client_ips: >-
          {{ (proxmox_client_ips | default([])) + [
              hostvars[item].ansible_host
              | default(hostvars[item].ip)
              | default(hostvars[item].ip_address)
            ] }}
      loop: "{{ groups['proxmox_clients'] | default([]) }}"
      when:
        - hostvars[item] is defined
        - hostvars[item].ansible_host is defined or hostvars[item].ip is defined or hostvars[item].ip_address is defined

    - name: Set IP allocation bounds
      ansible.builtin.set_fact:
        ip_offset: "{{ network_config.ip_offset | default(1) | int }}"
        max_hosts: "{{ network_config.max_hosts | default((network_config.cidr | ansible.utils.ipaddr('size') | int) - 2) | int }}"

    - name: Allocate first available static IP in subnet
      ansible.builtin.set_fact:
        final_ip_address: >-
          {{ (range((network_base_int | int) + (ip_offset | int),
                    (network_base_int | int) + (max_hosts | int) + 1)
              | map('ansible.utils.ipaddr')
              | reject('in', proxmox_client_ips | default([]))
              | list | first | default('')) }}
      vars:
        network_address: "{{ (network_config.cidr | ansible.utils.ipaddr('network')).split('/')[0] }}"
        network_octets: "{{ network_address.split('.') }}"
        network_base_int: >-
          {{ (network_octets[0] | int) * 16777216
             + (network_octets[1] | int) * 65536
             + (network_octets[2] | int) * 256
             + (network_octets[3] | int) }}

    - name: Assert an available IP was found in the subnet
      ansible.builtin.assert:
        that:
          - final_ip_address | length > 0
        fail_msg: "No available IPs found in {{ network_config.cidr }}"

- name: Set network instance facts
  ansible.builtin.set_fact:
    homelabinfra_instance:
      network:
        name: "{{ network_name }}"
        cidr: "{{ network_config.cidr }}"
        gateway: "{{ network_config.gateway | default(omit) }}"
        dns_servers: "{{ network_config.dns_servers | default(omit) }}"
        bridge: "{{ network_config.bridge | default(omit) }}"
        vlan: "{{ network_config.vlan | default(omit) }}"
        ip_address: "{{ final_ip_address }}"
  run_once: true
