homelabinfra_config:
  ansible:
    ssh_user: ""
    ssh_public_key: ""
  networks:
    default:
      cidr: "dhcp"
      gateway: ""
      dns_servers: []
      bridge: "vmbr0"
      vlan: 0
  # The community.proxmox dynamic inventory plugin (inventory/proxmox.yml) cannot read these values
  # via -e extra vars — it reads PROXMOX_API_HOST / PROXMOX_API_PORT / PROXMOX_API_USER /
  # PROXMOX_API_TOKEN_ID / PROXMOX_API_TOKEN_SECRET from the process environment instead. Populate
  # them from this same file with `scripts/with-proxmox-env.sh` (bare CLI / fresh clone), or export
  # them directly in the Rundeck/Semaphore job step before invoking ansible.
  proxmox:
    api_host: ""
    api_port: ""
    api_user: ""
    api_token_id: ""
    api_token_secret: ""
    node: ""
    lxc:
      hostname: ""
      ostemplate: ""
      network: "default"
    vm:
      vmid: 0
      name: ""
      ansible_host: ""
  docker_hosts: 
    docker_default_host:
      type: "vm"
  apps:
    docker_example:
      docker_tag: "docker_default_host"
  
